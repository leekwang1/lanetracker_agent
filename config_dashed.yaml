# =========================================================
# 차선 추적기 설정 파일 - 점선 모드
# =========================================================
#
# 읽는 방법
# - `[점수]`     : 후보 점수(score)를 계산할 때 직접 사용하는 항목
# - `[제한]`     : 점수와 별개로 후보를 아예 탈락시키거나 강하게 제한하는 항목
# - `[탐색]`     : 후보를 어디까지, 얼마나 촘촘히 찾을지 정하는 항목
# - `[보정]`     : 후보 선택 후 중심 보정, 방향 안정화, 결과 후처리에 관여하는 항목
# - `[적응]`     : 추적 중 프로파일(밝기/배경/높이 기준)을 갱신하는 항목
#
# 점선 모드 특징
# - 점이 안 보이는 구간을 오래 버티도록 `max_gap_m`을 크게 둡니다.
# - 더 밝은 옆 점선에 끌리지 않도록 `intensity` 영향은 줄이고,
#   `continuity`, `방향 유지`, `lane loyalty`를 더 강하게 둡니다.
# - 점선 사이 공백에서는 "지금 당장 가장 밝은 점"보다
#   "지금까지 따라오던 차선 흐름"을 우선하도록 맞춘 설정입니다.

# =========================================================
# 1. 추적 범위 / 탐색 설정
# =========================================================

# [탐색] 시작점으로부터 최대 몇 m까지 추적할지 설정합니다.
max_track_length_m: 500.0

# [탐색] 한 번에 전진하는 거리입니다.
# 값이 작을수록 더 촘촘하지만 계산량이 늘고,
# 값이 크면 점선 공백을 빠르게 건너지만 미세한 곡선에는 둔해질 수 있습니다.
step_m: 0.30

# [탐색] 예측 진행선 기준으로 좌우 탐색 범위입니다.
# 점선은 옆의 더 밝은 점선으로 새기 쉬워서 실선보다 좁게 잡는 편이 유리합니다.
search_half_width_m: 0.45

# [탐색] 전방 후보를 몇 단계로 나눠 만들지 정합니다.
# gap 구간에서도 전방 후보를 조금 더 촘촘히 보도록 유지합니다.
search_forward_samples: 7

# [탐색] 좌우 후보를 몇 칸으로 나눠 만들지 정합니다.
# 점선 모드에서는 옆 차선 유입을 줄이기 위해 lateral 후보 수를 적게 둡니다.
search_lateral_samples: 3

# [탐색] 후보 중심 주변에서 점수를 계산할 때 사용할 반경입니다.
# 너무 작으면 점선 재획득 시 포인트가 부족하고,
# 너무 크면 옆 점선/문자 마킹 영향까지 같이 받습니다.
search_radius_m: 0.26

# [탐색] 점수가 낮아도 차선이 잠깐 끊긴 것으로 보고 계속 전진할 최대 거리입니다.
# 점선 간격이 큰 지방도 데이터를 고려해 실선보다 크게 둡니다.
max_gap_m: 10.0

# [점수] 후보를 정상 추적으로 인정할 최소 점수입니다.
# 점선에서는 일시적으로 점수가 약해지는 구간이 많아 다소 낮게 둡니다.
min_score: 0.20

# [탐색] 주변 점 탐색을 빠르게 하기 위한 공간 격자 크기입니다.
# 보통 search_radius_m와 비슷한 수준이 무난합니다.
grid_size_m: 0.22

# [탐색] 시작점 주변에서 초기 차선 프로파일을 만들 때 사용할 반경입니다.
seed_profile_radius_m: 0.35

# [예약] 강도값 보정/확장용 설정입니다.
intensity_window_quantile_low: 0.55
intensity_window_quantile_high: 0.98

# =========================================================
# 2. 점수 계산 가중치
# =========================================================

# [점수] 직진/방향 유지 성향의 가중치입니다.
# 점선 공백에서 진행 방향이 흔들리지 않도록 실선보다 조금 높게 둡니다.
straight_bias_weight: 0.42

# [점수] 이전 흐름과의 거리 연속성 가중치입니다.
# 점선에서는 실제 점보다 "같은 흐름을 계속 타는지"가 더 중요해서 높게 둡니다.
continuity_weight: 0.42

# [점수] 주변 배경 대비 contrast 가중치입니다.
# 점선에서는 contrast보다 흐름 유지가 더 중요하므로 비중을 낮춥니다.
contrast_weight: 0.08

# [점수] 반사 강도(intensity) 가중치입니다.
# 옆에 더 밝은 점선이 있을 때 넘어가지 않도록 실선보다 많이 낮춘 값입니다.
intensity_weight: 0.20

# [점수] 한 스텝에서 허용할 최대 방향 변화량입니다.
# 점선 모드에서는 gap 중 방향이 과하게 꺾이지 않도록 너무 크게 두지 않습니다.
max_heading_change_deg: 6.0

# =========================================================
# 3. 높이(Z) 안정성
# =========================================================

# [점수] 적응된 차선 기준 높이에서 얼마나 벗어나도 되는지입니다.
z_tolerance_m: 0.45

# [점수] 직전 스텝 대비 높이 변화 허용치입니다.
max_z_step_m: 0.12

# [보정] 후보 위치의 대표 Z를 계산할 때, 이전 높이 근처 포인트를 우선 반영하는 범위입니다.
z_fit_window_m: 0.18

# [제한] 높이 변화가 너무 큰 후보는 점수 계산 전에 바로 탈락시킵니다.
hard_max_z_step_m: 0.14

# =========================================================
# 4. 중심 유지 / 하드 제한
# =========================================================

# [점수] 예측 중심선에서 좌우로 얼마나 벗어나도 점수상 허용할지입니다.
# 점선 모드에서는 옆 점선으로 새는 것을 줄이기 위해 조금 좁게 둡니다.
center_offset_tolerance_m: 0.09

# [점수] 중심선에서 벗어난 후보를 얼마나 강하게 감점할지 정합니다.
center_pull_weight: 0.98

# [제한] 예측 중심선에서 너무 벗어난 후보를 아예 탈락시키는 hard gate입니다.
# 점선에서 옆의 평행 마킹으로 건너가는 현상을 줄이는 데 중요합니다.
hard_center_offset_limit_m: 0.16

# =========================================================
# 5. 단면 기반 중심 보정
# =========================================================

# [보정] 후보 선택 후 주변 포인트로 중심을 미세 보정할 때 사용할 반경입니다.
center_refine_radius_m: 0.05

# [보정] 미세 보정 시 한 스텝에서 좌우로 이동할 수 있는 최대 거리입니다.
center_refine_max_shift_m: 0.03

# [보정] 단면(center cross-section)에서 차선 반폭 기준으로 사용할 값입니다.
lane_half_width_m: 0.09

# [보정] 단면 기반 중심 보정 시 주변을 탐색할 반경입니다.
cross_section_radius_m: 0.20

# [보정] 진행 방향 기준 앞뒤로 포함할 단면 길이입니다.
cross_section_forward_window_m: 0.10

# [보정] 단면 히스토그램의 bin 크기입니다.
cross_section_bin_size_m: 0.02

# [보정] 단면 peak 대비 어느 정도 이상을 같은 stripe로 볼지 정하는 비율입니다.
cross_section_stripe_threshold_ratio: 0.35

# [보정] 단면에서 허용할 최대 차선 반폭입니다.
cross_section_max_lane_half_width_m: 0.14

# [보정] stripe 중심과 가중 중심을 얼마나 섞을지 정합니다.
# 점선에서 밝은 일부 포인트에 치우치지 않도록 기하학적 중심 비중을 조금 높입니다.
cross_section_center_mix: 0.70

# =========================================================
# 6. 방향 안정화 / 차선 유지 성향
# =========================================================

# [보정] 진행 방향을 예측할 때 참조할 최근 포인트 수입니다.
# 점선 gap을 버티기 위해 실선보다 길게 둡니다.
direction_history_points: 8

# [보정] gap bridge 중에는 직전 선택 후보 방향보다 예측 방향을 계속 사용할지 여부입니다.
gap_use_predicted_direction: true

# [점수] 현재 차선을 계속 유지하려는 lane loyalty 가중치입니다.
# 점선에서는 순간적으로 더 밝은 옆 점선이 보여도 기존 차선을 더 고수하게 만듭니다.
lane_loyalty_weight: 0.85

# [점수] lane loyalty 기준을 만들 때 참조할 최근 포인트 수입니다.
lane_loyalty_history_points: 12

# [점수] 최근 중심선에서 이 정도 이상 벗어나면 lane loyalty 점수가 빠르게 떨어집니다.
lane_loyalty_tolerance_m: 0.05

# =========================================================
# 7. 프로파일 적응
# =========================================================

# [적응] 현재 위치 주변에서 새 프로파일을 계산할 반경입니다.
profile_update_radius_m: 0.35

# [적응] 새 프로파일을 기존 프로파일에 얼마나 빠르게 반영할지 정합니다.
# 점선에서는 잘못된 라인으로 샌 상태에서 오염되지 않도록 보수적으로 둡니다.
profile_update_alpha: 0.08

# [적응] 프로파일 업데이트를 허용할 최소 점수입니다.
profile_update_min_score: 0.40

# [적응/제한] 현재 중심선에서 너무 벗어난 상태면 프로파일을 업데이트하지 않습니다.
profile_update_max_lateral_offset_m: 0.04

# =========================================================
# 8. 결과 후처리 보정
# =========================================================

# [보정] 추적 후 짧게 옆으로 샜다가 돌아오는 detour 구간을 보정할지 여부입니다.
enable_post_correction: true

# [보정] 앞뒤 몇 개 포인트로 기준 진행 방향을 잡을지 정합니다.
post_correction_window: 20

# [보정] 기준선에서 이 정도 이상 벗어나야 detour 후보로 봅니다.
post_correction_lateral_threshold_m: 0.05

# [보정] 다시 이 정도 안으로 돌아오면 detour 구간이 끝난 것으로 봅니다.
post_correction_return_threshold_m: 0.02

# [보정] 너무 짧은 구간은 무시하기 위한 최소 길이입니다.
post_correction_min_segment_points: 3

# [보정] 너무 긴 구간은 실제 차선 변화일 수 있어 보정하지 않기 위한 최대 길이입니다.
post_correction_max_segment_points: 24

# [보정] 최종 결과를 이동 평균으로 부드럽게 만드는 창 크기입니다.
smoothing_window: 5

# =========================================================
# 9. 결과 / 디버그
# =========================================================

# [디버그] 디버그용 JSON 파일 저장 여부입니다.
save_debug_json: true
