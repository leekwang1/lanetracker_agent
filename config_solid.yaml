# =========================================================
# 차선 추적기 설정 파일
# =========================================================
#
# 읽는 방법
# - [점수]     : 후보 점수(score)를 계산할 때 직접 사용되는 항목
# - [제한]     : 점수와 별개로 후보를 아예 탈락시키거나 강하게 제한하는 항목
# - [탐색]     : 후보를 어디까지, 얼마나 촘촘히 찾을지 정하는 항목
# - [보정]     : 후보 선택 후 중심 보정, 방향 안정화, 결과 후처리에 쓰이는 항목
# - [적응]     : 추적 중 프로파일(밝기/배경/높이 기준)을 갱신하는 항목
#
# 일반적인 튜닝 순서
# 1. 옆 차선/강한 점선으로 새면: [제한], [점수] 중심 유지 항목부터 조정
# 2. 곡선에서 끊기면: [탐색], 방향 관련 항목을 완화
# 3. 결과가 구불구불하면: [보정], step_m, smoothing_window 조정

# =========================================================
# 1. 추적 범위 / 탐색 설정
# =========================================================

# [탐색] 시작점으로부터 최대 몇 m까지 추적할지 설정합니다.
# 값이 크면 더 멀리 추적하지만, 잘못된 차선을 잡았을 때 오래 끌고 갈 수도 있습니다.
max_track_length_m: 500.0

# [탐색] 한 번에 전진하는 거리입니다.
# 값이 작을수록 더 촘촘하게 따라가서 곡선/세부 형상에는 강하지만 계산량이 늘고 느려집니다.
# 값이 클수록 빠르지만, 점선 사이를 크게 건너뛰거나 흔들림이 커질 수 있습니다.
step_m: 0.30

# [탐색] 예측 진행선 기준 좌우로 후보를 어디까지 탐색할지 정합니다.
# 값이 크면 급격한 곡선이나 초기 오차 복구에는 유리하지만, 옆 차선/강한 도색도 후보에 들어오기 쉬워집니다.
search_half_width_m: 0.60

# [탐색] 전방 방향 후보를 몇 단계로 나눠서 만들지 정합니다.
# 수가 많을수록 세밀한 탐색이 가능하지만 계산량이 늘어납니다.
search_forward_samples: 5

# [탐색] 좌우 방향 후보를 몇 칸으로 나눠서 만들지 정합니다.
# 수가 많을수록 중심 미세 탐색은 좋아지지만, 잘못된 옆 띠도 더 잘 찾게 됩니다.
search_lateral_samples: 9

# [탐색] 각 후보 중심 주변에서 점수를 계산할 때 사용할 반경입니다.
# 너무 크면 옆 차선/잡음 영향까지 섞이고, 너무 작으면 포인트가 부족해 점수가 불안정해질 수 있습니다.
search_radius_m: 0.18

# [탐색] 점수가 낮아도 차선이 잠깐 끊긴 것으로 보고 계속 전진할 최대 거리입니다.
# 점선 간격이 넓거나 일부 구간이 지워진 경우를 버티게 해줍니다.
max_gap_m: 4.50

# [점수] 후보를 정상 추적으로 인정할 최소 점수입니다.
# 이 값보다 낮으면 포인트를 저장하지 않고 gap bridge 모드로 전진합니다.
min_score: 0.25

# [탐색] 주변 점 탐색을 빠르게 하기 위한 공간 격자 크기입니다.
# 보통 search_radius_m와 비슷한 수준이 무난합니다.
grid_size_m: 0.22

# [탐색] 시작점 주변에서 초기 차선 프로파일(밝기, 배경, 높이 기준)을 만들 때 사용할 반경입니다.
# 시작점을 얼마나 대표적인 차선 위에 찍었는지가 이 값의 영향에 크게 좌우됩니다.
seed_profile_radius_m: 0.35

# [예약] 강도값 보정/확장용 설정입니다.
# 현재 코드에서는 직접 사용되지 않지만, 이후 intensity window 정규화 등에 확장 가능하도록 남겨둔 값입니다.
intensity_window_quantile_low: 0.55
intensity_window_quantile_high: 0.98

# =========================================================
# 2. 점수 계산 가중치
# =========================================================

# [점수] 직진/방향 유지 성향의 가중치입니다.
# 값이 클수록 급격한 방향 변화보다 기존 진행 방향과 비슷한 후보를 선호합니다.
straight_bias_weight: 0.30

# [점수] 거리 연속성 가중치입니다.
# 값이 클수록 현재 step_m에 가까운 자연스러운 거리의 후보를 선호합니다.
continuity_weight: 0.25

# [점수] 주변 배경 대비(contrast) 가중치입니다.
# 값이 클수록 주변보다 더 눈에 띄는 후보를 선호합니다.
contrast_weight: 0.20

# [점수] 절대 강도(intensity) 가중치입니다.
# 값이 클수록 신호강도가 높은 후보가 유리해집니다.
# 옆의 더 밝은 점선으로 빨려 들어간다면 이 값을 낮추는 것이 도움이 될 수 있습니다.
intensity_weight: 0.25

# [점수] 한 스텝에서 허용할 최대 방향 변화량입니다.
# score 계산의 straight term 기준이 되며, 값이 작을수록 기존 방향을 더 고수합니다.
max_heading_change_deg: 5.0

# =========================================================
# 3. 높이(Z) 안정성
# =========================================================

# [점수] 적응된 차선 기준 높이(z_ref)에서 얼마나 벗어나도 허용할지 정합니다.
# 값이 작을수록 높이 변화에 민감하고, 값이 크면 경사/요철에는 강하지만 다른 구조물도 허용할 수 있습니다.
z_tolerance_m: 0.45

# [점수] 이전 스텝 대비 높이 변화량에 대한 점수 항입니다.
# 값이 작을수록 높이가 급변하는 후보는 점수가 크게 깎입니다.
max_z_step_m: 0.12

# [보정] 후보 위치의 대표 Z값을 계산할 때 이전 높이 근처 점들만 우선 반영하는 범위입니다.
# 공중 물체나 높은 장애물 때문에 Z가 오염되는 것을 줄여줍니다.
z_fit_window_m: 0.18

# [제한] 이전 스텝 대비 높이 변화가 이 값보다 크면 후보를 아예 탈락시킵니다.
# score 이전의 hard gate 역할을 합니다.
hard_max_z_step_m: 0.14

# =========================================================
# 4. 중심 유지 / 하드 제한
# =========================================================

# [점수] 예측 중심선에서 좌우로 얼마나 벗어나도 점수상 허용할지 정합니다.
# 값이 작을수록 중심선 근처 후보를 더 강하게 선호합니다.
center_offset_tolerance_m: 0.12

# [점수] 중심선 이탈 패널티를 얼마나 강하게 반영할지 정합니다.
# 1.0에 가까울수록 중심선에서 벗어난 후보의 점수가 크게 깎입니다.
center_pull_weight: 0.90

# [제한] 예측 중심선에서 좌우로 이 값보다 많이 벗어나면 후보를 아예 탈락시킵니다.
# center_offset_tolerance_m보다 더 강한 hard gate입니다.
hard_center_offset_limit_m: 0.18

# =========================================================
# 5. 단면 기반 중심 보정
# =========================================================

# [보정] 후보 선택 후 주변 점들로 중심을 미세 보정할 때 사용할 반경입니다.
# 너무 크면 옆 차선까지 섞일 수 있고, 너무 작으면 보정에 쓸 포인트가 부족할 수 있습니다.
center_refine_radius_m: 0.05

# [보정] 미세 보정 시 한 스텝에서 좌우로 움직일 수 있는 최대 거리입니다.
# 값이 작을수록 보정이 안정적이지만, 실제 중심까지 한 번에 복귀하기는 어려울 수 있습니다.
center_refine_max_shift_m: 0.03

# [보정] 단면(center cross-section)에서 차선 도색의 반폭 기준값입니다.
# 차선 폭 중심을 추정할 때 어느 정도 폭을 차선으로 볼지 정하는 기준입니다.
lane_half_width_m: 0.09

# [보정] 단면 기반 중심 보정 시 주변을 탐색할 반경입니다.
# 너무 크면 옆 차선 영향이 섞이고, 너무 작으면 단면 정보가 부족해질 수 있습니다.
cross_section_radius_m: 0.22

# [보정] 진행 방향 기준으로 앞뒤 어느 길이까지 포함해 단면 중심을 계산할지 정합니다.
# 값이 크면 안정적이지만, 지역적인 변화에 둔감해질 수 있습니다.
cross_section_forward_window_m: 0.10

# [보정] 단면 히스토그램의 bin 크기입니다.
# 작을수록 정밀하지만 노이즈에 민감하고, 클수록 안정적이지만 중심이 뭉개질 수 있습니다.
cross_section_bin_size_m: 0.02

# [보정] 단면 피크 대비 어느 정도 이상을 같은 도색 구간(stripe)으로 볼지 정합니다.
# 값이 작으면 넓게 묶고, 값이 크면 정말 강한 부분만 stripe로 봅니다.
cross_section_stripe_threshold_ratio: 0.35

# [보정] 단면에서 허용할 최대 차선 반폭입니다.
# 화살표, 문자, 넓은 마킹 같은 비차선 도색이 stripe로 잡히는 것을 억제하는 데 도움이 됩니다.
cross_section_max_lane_half_width_m: 0.14

# [보정] 단면 stripe의 기하학적 중심과 가중 중심을 얼마나 섞을지 정합니다.
# 1.0이면 stripe 폭의 정중앙, 0.0이면 밝기 가중 중심만 사용합니다.
cross_section_center_mix: 0.65
cross_section_peak_min_ratio: 0.20
cross_section_peak_min_separation_m: 0.05
cross_section_peak_weight: 0.15
cross_section_loyalty_weight: 0.60
cross_section_signal_similarity_weight: 0.25
cross_section_loyalty_tolerance_m: 0.08

# =========================================================
# 6. 방향 안정화 / 차선 유지 성향
# =========================================================

# [보정] 진행 방향을 안정화할 때 참조할 최근 포인트 개수입니다.
# 값이 크면 더 부드럽고 관성이 커지며, 값이 작으면 곡선 적응이 빠릅니다.
direction_history_points: 6

# [보정] gap bridge 중에는 선택된 후보 방향 대신 예측 방향을 계속 사용할지 여부입니다.
# true면 끊긴 구간에서 방향이 급격히 틀어지는 것을 줄이는 데 도움이 됩니다.
gap_use_predicted_direction: true

# [점수] 현재 차선을 계속 유지하려는 점수 항의 가중치입니다.
# 최근 중심선에서 멀어질수록 감점하며, 값이 클수록 "지금까지 따라온 차선"을 더 고수합니다.
lane_loyalty_weight: 0.75


# [점수] lane loyalty 기준을 만들 때 참조할 최근 포인트 수입니다.
# 값이 크면 더 긴 구간의 차선 흐름을 유지하려 하고, 값이 작으면 최근 변화에 더 민감합니다.
lane_loyalty_history_points: 6

# [점수] 최근 중심선에서 이 정도 이상 벗어나면 lane loyalty 점수가 크게 깎이기 시작합니다.
# 값이 작을수록 옆 차선으로 새는 것을 더 강하게 억제합니다.(횡단보도에서 정지됨 ki)
lane_loyalty_tolerance_m: 0.08


# =========================================================
# 7. 프로파일 적응
# =========================================================

# [적응] 현재 위치 주변에서 새 프로파일을 계산할 반경입니다.
# 차선의 밝기/배경/높이 기준을 서서히 업데이트할 때 사용합니다.
profile_update_radius_m: 0.35

# [적응] 새 프로파일을 기존 프로파일에 얼마나 빠르게 반영할지 정합니다.
# 값이 크면 환경 변화에는 빠르게 적응하지만, 잘못된 띠를 잡았을 때 오염도 빨라집니다.
profile_update_alpha: 0.18

# [적응] 프로파일을 업데이트할 최소 점수입니다.
# 신뢰도가 낮은 포인트에서는 프로파일이 오염되지 않도록 막아줍니다.
profile_update_min_score: 0.25

# [적응/제한] 예측 중심선에서 이 정도 이상 벗어난 포인트에서는 프로파일 업데이트를 하지 않습니다.
# 추적이 조금 샌 상태에서 잘못된 차선 특성으로 적응하는 것을 방지합니다.
profile_update_max_lateral_offset_m: 0.06

# =========================================================
# 8. 결과 후처리 보정
# =========================================================

# [보정] 추적 후 잠깐 옆 점선으로 빠졌다가 다시 돌아온 detour 구간을 보정할지
enable_post_correction: true

# [보정] 앞뒤 몇 포인트로 기준 진행 방향을 잡을지
post_correction_window: 20

# [보정] 기준선에서 이 정도 이상 벗어나야 detour 후보로 판단
post_correction_lateral_threshold_m: 0.05

# [보정] 다시 이 값 아래로 돌아오면 detour 구간이 끝난 것으로 판단
post_correction_return_threshold_m: 0.02

# [보정] 너무 짧은 구간은 무시하기 위한 최소 길이
post_correction_min_segment_points: 3

# [보정] 너무 긴 구간은 실제 차선 변화일 수 있어 보정하지 않기 위한 최대 길이
post_correction_max_segment_points: 20

# [보정] 최종 결과를 이동 평균으로 부드럽게 만드는 창 크기입니다.
# 추적이 끝난 뒤 적용되는 후처리이므로, 실제 후보 선택에는 직접 영향이 없습니다.
smoothing_window: 5

# =========================================================
# 9. 디버그
# =========================================================

# [디버그] 디버그용 JSON 파일 저장 여부입니다.
# true면 stop_reason, 후보 점수, 각 step의 상세 정보가 저장됩니다.
save_debug_json: true
